<!-- Carrier Logos -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none;">
  <!-- AT&T -->
  <symbol id="logo-att" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="45" fill="#00A8E0"/>
    <path d="M50 15 C30 15 15 30 15 50 C15 70 30 85 50 85 C70 85 85 70 85 50 C85 30 70 15 50 15 Z M50 25 C65 25 75 35 75 50 C75 65 65 75 50 75 C35 75 25 65 25 50 C25 35 35 25 50 25 Z" fill="white"/>
  </symbol>
  
  <!-- T-Mobile -->
  <symbol id="logo-tmobile" viewBox="0 0 100 100">
    <rect x="10" y="10" width="80" height="80" rx="20" fill="#E20074"/>
    <text x="50" y="65" font-family="Arial" font-size="50" font-weight="bold" text-anchor="middle" fill="white">T</text>
  </symbol>
  
  <!-- Verizon -->
  <symbol id="logo-verizon" viewBox="0 0 100 100">
    <rect x="10" y="10" width="80" height="80" rx="10" fill="#CD040B"/>
    <text x="50" y="55" font-family="Arial" font-size="35" font-weight="bold" text-anchor="middle" fill="white">V</text>
    <path d="M25 70 L35 85 L45 70" stroke="#FEDF00" stroke-width="4" fill="none"/>
  </symbol>
  
  <!-- Unlocked -->
  <symbol id="logo-unlocked" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="45" fill="#10B981"/>
    <rect x="35" y="45" width="30" height="25" rx="3" fill="white"/>
    <path d="M40 45 L40 35 C40 28 45 25 50 25 C55 25 60 28 60 35 L60 45" stroke="white" stroke-width="6" fill="none"/>
  </symbol>
  
  <!-- Other -->
  <symbol id="logo-other" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="45" fill="#6B7280"/>
    <text x="50" y="60" font-family="Arial" font-size="40" text-anchor="middle" fill="white">?</text>
  </symbol>
</svg>
