<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneTrack - Login</title>
    <style>
        /* Splash Screen */
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f0f0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.3s ease-out;
        }
        html, body {
            background: #0f0f0f;
        }
        #splash.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .splash-logo {
            width: 120px;
            height: 120px;
            border-radius: 24px;
            animation: pulse 1.5s ease-in-out infinite;
            box-shadow: 0 0 60px rgba(16, 185, 129, 0.4);
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .splash-text {
            margin-top: 24px;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #10b981, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .loading-bar {
            width: 200px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-top: 32px;
            overflow: hidden;
        }
        .loading-progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #10b981, #34d399);
            border-radius: 2px;
            animation: load 2s ease-out forwards;
        }
        @keyframes load {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f0f0f0;
        }
        .login-container {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            font-size: 60px;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 30px;
            color: #10b981;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #888;
        }
        input {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            color: #f0f0f0;
            font-size: 16px;
            outline: none;
        }
        input:focus {
            border-color: #10b981;
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            opacity: 0.9;
        }
        .error {
            color: #ef4444;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">📱</div>
        <h1>PhoneTrack Login</h1>
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>
            <button type="submit">Sign In</button>
            <div id="error" class="error"></div>
        </form>
    </div>

    <!-- Splash Screen -->
    <div id="splash">
        <img src="/logo.jpg" class="splash-logo" alt="PhoneTrack">
        <div class="splash-text">PhoneTrack</div>
        <div class="loading-bar">
            <div class="loading-progress"></div>
        </div>
    </div>

    <script>
        // Immediately show splash (prevents browser default splash flash)
        document.documentElement.style.background = '#0f0f0f';
        
        // Default credentials
        const DEFAULT_PASSWORDS = {
            'Columbus': 'Morocco'
        };
        
        // Hide splash screen after animation
        setTimeout(() => {
            const splash = document.getElementById('splash');
            if (splash) splash.classList.add('hidden');
        }, 1800);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const r = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ username, password })
                });
                
                if (r.ok) {
                    window.location.href = '/';
                } else {
                    document.getElementById('error').textContent = 'Invalid username or password';
                }
            } catch (err) {
                document.getElementById('error').textContent = 'Login failed. Please try again.';
            }
        });
    </script>
</body>
</html>
